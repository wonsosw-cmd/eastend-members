<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>매장용 멤버십</title>
<style>
  :root { --navy: #1b2a4a; --teal: #2a9d8f; --amber: #e9a13b; --bg: #f2f4f7; --line: #e4e8ee; --muted: #8a93a5; --danger: #d64545; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Pretendard", -apple-system, "Malgun Gothic", sans-serif; background: var(--bg); color: #22293a; }
  .wrap { max-width: 460px; margin: 0 auto; min-height: 100vh; background: #fff; }
  header { background: var(--navy); color: #fff; padding: 18px 20px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 16px; font-weight: 800; flex: 1; }
  header .store-badge { font-size: 12px; background: rgba(255,255,255,.15); border-radius: 12px; padding: 4px 10px; cursor: pointer; }
  .body { padding: 20px 18px 40px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 16px; font-family: inherit; -webkit-appearance: none; appearance: none; background: #fff;
  }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15.5px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .btn.primary { background: var(--navy); color: #fff; }
  .btn.teal { background: var(--teal); color: #fff; }
  .btn.amber { background: var(--amber); color: #1b2a4a; }
  .btn:disabled { opacity: .5; }
  .card { border: 1.5px solid var(--line); border-radius: 14px; padding: 18px; margin: 16px 0; }
  .member-name { font-size: 20px; font-weight: 800; }
  .member-sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .bal-row { display: flex; gap: 10px; margin-top: 14px; }
  .bal { flex: 1; background: #f8f9fb; border-radius: 10px; padding: 12px; text-align: center; }
  .bal .k { font-size: 11.5px; color: var(--muted); font-weight: 600; }
  .bal .v { font-size: 20px; font-weight: 800; margin-top: 3px; }
  .bal .v.point { color: var(--teal); }
  .tabs { display: flex; gap: 8px; margin: 18px 0 12px; }
  .tabs button { flex: 1; padding: 11px; border: 1.5px solid var(--line); background: #fff; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--muted); font-family: inherit; cursor: pointer; }
  .tabs button.on { border-color: var(--navy); color: var(--navy); background: #f0f3f9; }
  .panel { display: none; }
  .panel.on { display: block; }
  .msg { margin-top: 12px; font-size: 13.5px; font-weight: 600; line-height: 1.6; min-height: 20px; }
  .msg.ok { color: #2c7a3e; }
  .msg.err { color: var(--danger); }
  .note { font-size: 11.5px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  #memberCard, #actionArea { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>매장용 멤버십 관리</h1>
    <span class="store-badge" id="storeBadge" onclick="changeStore()">매장 선택</span>
  </header>
  <div class="body">
    <!-- 토큰 게이트 -->
    <div id="gate">
      <div class="field"><label>매장용 토큰</label><input type="password" id="staffToken" placeholder="매장용 토큰 입력"></div>
      <div class="field"><label>우리 매장</label><select id="storeSel"></select></div>
      <button class="btn primary" onclick="saveGate()">시작하기</button>
      <div class="note">토큰은 관리자에게 문의하세요. 이 기기에 저장됩니다.</div>
    </div>

    <!-- 조회 -->
    <div id="main" style="display:none;">
      <div class="field">
        <label>고객 휴대전화번호</label>
        <input type="tel" id="qPhone" placeholder="010-0000-0000" inputmode="numeric" maxlength="13">
      </div>
      <button class="btn primary" id="btnLookup" onclick="lookup()">조회</button>
      <div class="msg" id="lookupMsg"></div>

      <div class="card" id="memberCard">
        <div class="member-name" id="mName">-</div>
        <div class="member-sub" id="mSub">-</div>
        <div class="bal-row">
          <div class="bal"><div class="k">사용 가능 마일리지</div><div class="v point" id="mBal">0P</div></div>
        </div>
        <div class="note">※ 고객 성함을 확인한 뒤 진행해주세요.</div>
      </div>

      <div id="actionArea">
        <div class="tabs">
          <button id="tabEarn" class="on" onclick="showTab('earn')">🧾 영수증 적립</button>
          <button id="tabUse" onclick="showTab('use')">💸 마일리지 차감</button>
        </div>
        <div class="panel on" id="panelEarn">
          <div class="field"><label>영수증 번호</label><input type="text" id="eNo" maxlength="30" placeholder="영수증 하단의 번호"></div>
          <div class="field"><label>결제 금액</label><input type="tel" id="eAmt" inputmode="numeric" maxlength="11" placeholder="예: 59,000"></div>
          <button class="btn teal" id="btnEarn" onclick="earn()">적립 등록 (1% 즉시 적립)</button>
          <div class="msg" id="earnMsg"></div>
          <div class="note">※ 영수증 적립은 회원가입 익일부터 가능 (신규가입 3,000P는 가입 즉시 자동 지급)</div>
        </div>
        <div class="panel" id="panelUse">
          <div class="field"><label>차감할 포인트 (1P = 1원 에누리)</label><input type="tel" id="uAmt" inputmode="numeric" maxlength="9" placeholder="예: 5,000"></div>
          <button class="btn amber" id="btnUse" onclick="redeem()">차감 (에누리 적용)</button>
          <div class="msg" id="useMsg"></div>
          <div class="note">※ 5,000P부터 1,000P 단위로 사용 가능 · 포인트는 적립일로부터 1년 경과 시 자동 소멸</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="stores.js"></script>
<script src="config.js"></script>
<script>
const sel = document.getElementById("storeSel");
window.EE_STORES.forEach(s => {
  const o = document.createElement("option");
  o.value = s.id; o.textContent = "[" + s.brandKo + "] " + s.name;
  sel.appendChild(o);
});

let TOKEN = localStorage.getItem("ee_staff_token") || "";
let STORE = window.EE_STORE_BY_ID[localStorage.getItem("ee_staff_store")] || null;
let CUR_PHONE = "";

function refreshGate() {
  const ready = TOKEN && STORE;
  document.getElementById("gate").style.display = ready ? "none" : "block";
  document.getElementById("main").style.display = ready ? "block" : "none";
  document.getElementById("storeBadge").textContent = STORE ? (STORE.brandKo + " " + STORE.name) : "매장 선택";
}
function saveGate() {
  const t = document.getElementById("staffToken").value.trim();
  if (!t) { alert("토큰을 입력해주세요."); return; }
  TOKEN = t; STORE = window.EE_STORE_BY_ID[sel.value];
  localStorage.setItem("ee_staff_token", TOKEN);
  localStorage.setItem("ee_staff_store", STORE.id);
  refreshGate();
}
function changeStore() {
  localStorage.removeItem("ee_staff_token");
  localStorage.removeItem("ee_staff_store");
  TOKEN = ""; STORE = null;
  refreshGate();
}
refreshGate();

// 하이픈/콤마 처리
document.getElementById("qPhone").addEventListener("input", e => {
  let v = e.target.value.replace(/\D/g, "").slice(0, 11);
  if (v.length > 7) v = v.slice(0,3) + "-" + v.slice(3,7) + "-" + v.slice(7);
  else if (v.length > 3) v = v.slice(0,3) + "-" + v.slice(3);
  e.target.value = v;
});
["eAmt","uAmt"].forEach(id => document.getElementById(id).addEventListener("input", e => {
  const v = e.target.value.replace(/\D/g, "").slice(0, 8);
  e.target.value = v ? Number(v).toLocaleString() : "";
}));

async function api(payload) {
  payload.staffToken = TOKEN;
  payload.storeId = STORE.id; payload.storeName = STORE.name; payload.brand = STORE.brandKo;
  const res = await fetch(window.EE_CONFIG.API_URL, {
    method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  return res.json();
}
function setMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = "msg " + (ok ? "ok" : "err");
}

async function lookup() {
  const phone = document.getElementById("qPhone").value.trim();
  if (!/^01[016789]-\d{3,4}-\d{4}$/.test(phone)) { setMsg("lookupMsg", "전화번호를 확인해주세요.", false); return; }
  const btn = document.getElementById("btnLookup");
  btn.disabled = true; setMsg("lookupMsg", "조회 중...", true);
  try {
    const j = await api({ action: "staff_lookup", phone });
    if (j.result !== "ok") throw new Error(j.message);
    if (!j.exists) {
      document.getElementById("memberCard").style.display = "none";
      document.getElementById("actionArea").style.display = "none";
      setMsg("lookupMsg", "미가입 고객입니다. QR로 가입을 안내해주세요.", false);
      return;
    }
    CUR_PHONE = phone;
    document.getElementById("mName").textContent = j.name + " 고객님";
    document.getElementById("mSub").textContent = "가입일 " + j.joinedAt + " · 방문 " + j.visitCount + "회";
    document.getElementById("mBal").textContent = Number(j.balance).toLocaleString() + "P";
    document.getElementById("memberCard").style.display = "block";
    document.getElementById("actionArea").style.display = "block";
    setMsg("lookupMsg", "", true);
  } catch (e) {
    setMsg("lookupMsg", "조회 실패: " + e.message + (e.message === "unauthorized" ? " (토큰 확인)" : ""), false);
  } finally { btn.disabled = false; }
}

function showTab(t) {
  document.getElementById("tabEarn").className = t === "earn" ? "on" : "";
  document.getElementById("tabUse").className = t === "use" ? "on" : "";
  document.getElementById("panelEarn").className = "panel" + (t === "earn" ? " on" : "");
  document.getElementById("panelUse").className = "panel" + (t === "use" ? " on" : "");
}

async function earn() {
  const no = document.getElementById("eNo").value.trim();
  const amt = document.getElementById("eAmt").value.replace(/\D/g, "");
  if (!no || !amt) { setMsg("earnMsg", "영수증 번호와 금액을 입력해주세요.", false); return; }
  if (!confirm("영수증 " + no + " / " + Number(amt).toLocaleString() + "원 적립 등록할까요?")) return;
  const btn = document.getElementById("btnEarn"); btn.disabled = true;
  try {
    const j = await api({ action: "staff_earn", phone: CUR_PHONE, receiptNo: no, amount: amt });
    if (j.result !== "ok") throw new Error(j.message);
    document.getElementById("mBal").textContent = Number(j.balance).toLocaleString() + "P";
    setMsg("earnMsg", j.receipt.points.toLocaleString() + "P 즉시 적립 완료! 잔액 " + Number(j.balance).toLocaleString() + "P", true);
    document.getElementById("eNo").value = ""; document.getElementById("eAmt").value = "";
  } catch (e) { setMsg("earnMsg", "실패: " + e.message, false); }
  finally { btn.disabled = false; }
}

async function redeem() {
  const amt = document.getElementById("uAmt").value.replace(/\D/g, "");
  if (!amt) { setMsg("useMsg", "차감 포인트를 입력해주세요.", false); return; }
  if (Number(amt) < 5000) { setMsg("useMsg", "5,000P부터 사용 가능합니다.", false); return; }
  if (Number(amt) % 1000 !== 0) { setMsg("useMsg", "1,000P 단위로만 사용 가능합니다.", false); return; }
  if (!confirm(Number(amt).toLocaleString() + "P 차감(에누리 적용)할까요?")) return;
  const btn = document.getElementById("btnUse"); btn.disabled = true;
  try {
    const j = await api({ action: "staff_redeem", phone: CUR_PHONE, amount: amt });
    if (j.result !== "ok") throw new Error(j.message);
    document.getElementById("mBal").textContent = Number(j.balance).toLocaleString() + "P";
    setMsg("useMsg", j.used.toLocaleString() + "P 차감 완료. 잔액 " + Number(j.balance).toLocaleString() + "P", true);
    document.getElementById("uAmt").value = "";
  } catch (e) { setMsg("useMsg", "실패: " + e.message, false); }
  finally { btn.disabled = false; }
}
</script>
</body>
</html>
