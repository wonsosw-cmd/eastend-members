<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>영수증 적립 신청</title>
<style>
  :root { --navy: #1b2a4a; --teal: #2a9d8f; --bg: #f6f7f9; --line: #e4e8ee; --muted: #8a93a5; --danger: #d64545; --brand: var(--navy); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Pretendard", -apple-system, "Malgun Gothic", sans-serif; background: var(--bg); color: #22293a; }
  .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; }
  .hero { background: var(--brand); color: #fff; padding: 30px 24px 24px; }
  .hero h1 { font-size: 22px; font-weight: 800; }
  .hero p { font-size: 13px; opacity: .85; margin-top: 8px; line-height: 1.6; }
  .body { padding: 24px 22px 40px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 16px; font-family: inherit; -webkit-appearance: none; appearance: none; background: #fff;
  }
  .photo-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px;
    border: 1.5px solid var(--line); border-radius: 10px; background: #fff; font-size: 14px; font-weight: 600;
    color: var(--muted); cursor: pointer; font-family: inherit; }
  .photo-btn.has { border-color: var(--teal); color: var(--teal); }
  #preview { display: none; width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; margin-top: 10px; background: #f1f3f6; }
  .btn { width: 100%; margin-top: 20px; padding: 15px; border: none; border-radius: 12px; background: var(--brand); color: #fff; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .btn:disabled { opacity: .5; }
  .msg { margin-top: 14px; font-size: 14px; font-weight: 600; line-height: 1.7; text-align: center; }
  .msg.ok { color: #2c7a3e; }
  .msg.err { color: var(--danger); }
  .note { font-size: 12px; color: var(--muted); margin-top: 14px; line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>🧾 영수증 적립 신청</h1>
    <p>구매 영수증을 등록하면 결제금액의 1%가<br>마일리지로 즉시 적립됩니다.<br>(가입 익일부터 적립 가능 · 5,000P부터 1,000P 단위 사용 · 적립 후 1년 경과 시 소멸)</p>
  </div>
  <div class="body">
    <div class="field"><label>휴대전화번호 (가입 번호)</label><input type="tel" id="phone" placeholder="010-0000-0000" inputmode="numeric" maxlength="13"></div>
    <div class="field"><label>구매 매장</label><select id="storeSel"></select></div>
    <div class="field"><label>영수증 번호</label><input type="text" id="rNo" placeholder="영수증 하단의 번호" maxlength="30"></div>
    <div class="field"><label>결제 금액</label><input type="tel" id="rAmt" placeholder="예: 59,000" inputmode="numeric" maxlength="11"></div>
    <input type="file" id="rPhoto" accept="image/*" capture="environment" style="display:none;">
    <button type="button" class="photo-btn" id="rPhotoBtn" onclick="document.getElementById('rPhoto').click()">📷 영수증 사진 촬영/첨부 (선택)</button>
    <img id="preview" alt="영수증 미리보기">
    <button class="btn" id="btnGo" onclick="submitReceipt()">적립 신청하기</button>
    <div class="msg" id="msg"></div>
    <div class="note">아직 회원이 아니신가요? 매장 QR로 가입 후 이용해주세요.<br>같은 영수증은 한 번만 등록할 수 있습니다.</div>
  </div>
</div>

<script src="stores.js"></script>
<script src="config.js"></script>
<script>
const params = new URLSearchParams(location.search);
const sel = document.getElementById("storeSel");
window.EE_STORES.forEach(s => {
  const o = document.createElement("option");
  o.value = s.id; o.textContent = "[" + s.brandKo + "] " + s.name;
  sel.appendChild(o);
});
const pre = (params.get("store") || "").toUpperCase();
if (window.EE_STORE_BY_ID[pre]) sel.value = pre;

document.getElementById("phone").addEventListener("input", e => {
  let v = e.target.value.replace(/\D/g, "").slice(0, 11);
  if (v.length > 7) v = v.slice(0,3) + "-" + v.slice(3,7) + "-" + v.slice(7);
  else if (v.length > 3) v = v.slice(0,3) + "-" + v.slice(3);
  e.target.value = v;
});
document.getElementById("rAmt").addEventListener("input", e => {
  const v = e.target.value.replace(/\D/g, "").slice(0, 8);
  e.target.value = v ? Number(v).toLocaleString() : "";
});

let photoB64 = "", photoType = "";
document.getElementById("rPhoto").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = await new Promise((res, rej) => {
    const i = new Image(); i.onload = () => res(i); i.onerror = rej;
    i.src = URL.createObjectURL(file);
  });
  const scale = Math.min(1, 1280 / Math.max(img.width, img.height));
  const cv = document.createElement("canvas");
  cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
  cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
  const dataUrl = cv.toDataURL("image/jpeg", 0.72);
  photoB64 = dataUrl.split(",")[1]; photoType = "image/jpeg";
  document.getElementById("preview").src = dataUrl;
  document.getElementById("preview").style.display = "block";
  const btn = document.getElementById("rPhotoBtn");
  btn.classList.add("has"); btn.textContent = "✓ 사진 첨부됨 (다시 찍기)";
});

function setMsg(t, ok) {
  const el = document.getElementById("msg");
  el.textContent = t; el.className = "msg " + (ok ? "ok" : "err");
}

async function submitReceipt() {
  const phone = document.getElementById("phone").value.trim();
  const no = document.getElementById("rNo").value.trim();
  const amt = document.getElementById("rAmt").value.replace(/\D/g, "");
  const st = window.EE_STORE_BY_ID[sel.value];
  if (!/^01[016789]-\d{3,4}-\d{4}$/.test(phone)) { setMsg("전화번호를 확인해주세요.", false); return; }
  if (!no || !amt) { setMsg("영수증 번호와 결제 금액을 입력해주세요.", false); return; }

  const btn = document.getElementById("btnGo");
  btn.disabled = true; setMsg("접수 중...", true);
  try {
    const payload = {
      action: "receipt", phone, receiptNo: no, amount: amt,
      storeId: st.id, storeName: st.name, brand: st.brandKo,
    };
    if (photoB64) { payload.photo = photoB64; payload.photoType = photoType; }
    const res = await fetch(window.EE_CONFIG.API_URL, {
      method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    });
    const j = await res.json();
    if (j.result !== "ok") throw new Error(j.message);
    setMsg(j.name + "님, " + j.receipt.points.toLocaleString() + "P가 즉시 적립되었습니다!", true);
    document.getElementById("rNo").value = ""; document.getElementById("rAmt").value = "";
  } catch (e) {
    setMsg("접수 실패: " + e.message, false);
  } finally { btn.disabled = false; }
}
</script>
</body>
</html>
