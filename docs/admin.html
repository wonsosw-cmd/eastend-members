<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<title>멤버십 관리자</title>
<style>
  :root { --navy: #1b2a4a; --teal: #2a9d8f; --amber: #e9a13b; --bg: #f2f4f7; --line: #e4e8ee; --muted: #8a93a5; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Pretendard Variable", "Pretendard", -apple-system, "Malgun Gothic", sans-serif; background: var(--bg); color: #22293a; }
  header { background: var(--navy); color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 800; }
  header .sp { flex: 1; }
  header button { padding: 8px 14px; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; background: rgba(255,255,255,.15); color: #fff; }
  header button.primary { background: var(--amber); color: var(--navy); }
  .container { max-width: 1100px; margin: 0 auto; padding: 22px 18px 60px; }
  /* 로그인 */
  .gate { max-width: 360px; margin: 90px auto; background: #fff; border-radius: 16px; padding: 34px 30px; box-shadow: 0 4px 18px rgba(27,42,74,.1); text-align: center; }
  .gate h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .gate p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .gate input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 15px; font-family: inherit; margin-bottom: 12px; }
  .gate button { width: 100%; padding: 13px; border: none; border-radius: 10px; background: var(--navy); color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .gate .msg { font-size: 12.5px; color: #d64545; margin-top: 10px; min-height: 16px; }
  /* 통계 카드 */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(27,42,74,.06); }
  .card .k { font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .card .v { font-size: 26px; font-weight: 800; margin-top: 6px; }
  .card .v small { font-size: 13px; color: var(--muted); font-weight: 600; }
  /* 필터 */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .filters select, .filters input { padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 14px; font-family: inherit; background: #fff; }
  .filters input { flex: 1; min-width: 180px; }
  /* 테이블 */
  .tbl-wrap { background: #fff; border-radius: 14px; overflow: auto; box-shadow: 0 2px 8px rgba(27,42,74,.06); }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 760px; }
  th, td { padding: 11px 14px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { background: #f8f9fb; font-size: 12px; color: var(--muted); font-weight: 700; position: sticky; top: 0; }
  tr:hover td { background: #fafbfd; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11.5px; font-weight: 700; }
  .pill.city { background: #e8ecf5; color: var(--navy); }
  .pill.artid { background: #e2f3f1; color: #1d7a70; }
  .pill.y { background: #e2f3e6; color: #2c7a3e; }
  .pill.n { background: #f3f4f6; color: var(--muted); }
  .empty { padding: 44px; text-align: center; color: var(--muted); font-size: 14px; }
  .count-note { font-size: 12.5px; color: var(--muted); margin: 10px 2px; }
  /* 적립지급 체크 */
  td.paid-cell { text-align: center; }
  .paid-chk { width: 22px; height: 22px; cursor: pointer; accent-color: var(--teal); vertical-align: middle; }
  .paid-v { display: inline-block; min-width: 46px; text-align: center; font-weight: 800; font-size: 14px; color: var(--teal); }
  tr.is-paid td { background: #f2faf5; }
  tr.is-paid:hover td { background: #eaf6ef; }
  .card .v.paidnum { color: var(--teal); }
  .card .v.errnum { color: #d64545; }
  td.birth-err { color: #d64545; font-weight: 700; }
  td.birth-err::after { content: " ⚠"; font-size: 11px; }
</style>
</head>
<body>
<div id="gateView" class="gate">
  <h2>멤버십 관리자</h2>
  <p>관리자 토큰을 입력해주세요.</p>
  <input type="password" id="tokenInput" placeholder="관리자 토큰" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">접속</button>
  <div class="msg" id="gateMsg"></div>
</div>

<div id="mainView" style="display:none;">
  <header>
    <h1>EASTEND 오프라인 멤버십 관리</h1>
    <div class="sp"></div>
    <button class="primary" onclick="downloadRegXlsx()">📋 회원등록용 엑셀</button>
    <button onclick="downloadCsv()">전체 CSV</button>
    <button onclick="loadData()">새로고침</button>
    <button onclick="logout()">로그아웃</button>
  </header>
  <div class="container">
    <div class="cards">
      <div class="card"><div class="k">전체 회원</div><div class="v" id="stTotal">-</div></div>
      <div class="card"><div class="k">오늘 신규</div><div class="v" id="stToday">-</div></div>
      <div class="card"><div class="k">최근 7일</div><div class="v" id="stWeek">-</div></div>
      <div class="card"><div class="k">적립금 지급 완료</div><div class="v paidnum" id="stPaid">-</div></div>
      <div class="card"><div class="k">생년월일 확인필요</div><div class="v errnum" id="stBirthErr">-</div></div>
    </div>
    <div class="filters">
      <select id="fBrand"><option value="">브랜드 전체</option><option>시티브리즈</option><option>아티드</option></select>
      <select id="fStore"><option value="">매장 전체</option></select>
      <select id="fMkt"><option value="">마케팅동의 전체</option><option value="Y">동의</option><option value="N">미동의</option></select>
      <select id="fPaid"><option value="">적립지급 전체</option><option value="paid">지급 완료</option><option value="unpaid">미지급</option></select>
      <select id="fBirth"><option value="">생년월일 전체</option><option value="ok">정상</option><option value="err">확인필요(오류)</option></select>
      <input type="text" id="fSearch" placeholder="이름 / 전화번호 검색">
    </div>
    <div class="count-note" id="countNote"></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>적립지급</th><th>가입일시</th><th>브랜드</th><th>매장</th><th>이름</th><th>휴대전화</th>
          <th>생년월일</th><th>성별</th><th>마케팅동의</th><th>야간동의</th><th>최근방문</th><th>방문횟수</th>
        </tr></thead>
        <tbody id="tbody"><tr><td colspan="12" class="empty">데이터를 불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="stores.js"></script>
<script src="config.js"></script>
<script>
let TOKEN = sessionStorage.getItem("ee_admin_token") || "";
let ROWS = [];

// 매장 필터 옵션
const fs = document.getElementById("fStore");
window.EE_STORES.forEach(s => {
  const o = document.createElement("option");
  o.value = s.name; o.textContent = `[${s.brandKo}] ${s.name}`;
  fs.appendChild(o);
});
["fBrand","fStore","fMkt","fPaid","fBirth"].forEach(id => document.getElementById(id).addEventListener("change", renderTable));
document.getElementById("fSearch").addEventListener("input", renderTable);

// 생년월일 정규화: 시트 저장 시 앞자리 0이 날아간 경우(041021→41021) 복원
// 4~5자리 숫자는 앞을 0으로 채워 6자리로 (2000년대 초반생 YY=00~09)
function normBirth(v) {
  let s = String(v || "").replace(/\D/g, "");
  if (s.length >= 4 && s.length <= 5) s = s.padStart(6, "0");
  return s;
}
// 유효성: 정규화 후 6자리(YYMMDD) 또는 8자리(YYYYMMDD)면 정상
function isBirthValid(v) {
  const s = normBirth(v);
  return s.length === 6 || s.length === 8;
}

if (TOKEN) { showMain(); }

async function login() {
  const t = document.getElementById("tokenInput").value.trim();
  if (!t) return;
  document.getElementById("gateMsg").textContent = "확인 중...";
  try {
    const j = await api("list", t);
    if (j.result !== "ok") throw new Error(j.message || "인증 실패");
    TOKEN = t;
    sessionStorage.setItem("ee_admin_token", t);
    ROWS = j.rows;
    showMain(true);
  } catch (e) {
    document.getElementById("gateMsg").textContent = "인증에 실패했습니다. 토큰을 확인해주세요.";
  }
}
function logout() {
  sessionStorage.removeItem("ee_admin_token");
  location.reload();
}
function showMain(skipLoad) {
  document.getElementById("gateView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
  if (skipLoad) { renderAll(); } else { loadData(); }
}

async function api(action, token) {
  if (!window.EE_CONFIG.API_URL) throw new Error("config.js에 API_URL이 설정되지 않았습니다.");
  const url = `${window.EE_CONFIG.API_URL}?action=${action}&token=${encodeURIComponent(token)}`;
  const res = await fetch(url);
  return res.json();
}

async function loadData() {
  document.getElementById("tbody").innerHTML = '<tr><td colspan="12" class="empty">데이터를 불러오는 중...</td></tr>';
  try {
    const j = await api("list", TOKEN);
    if (j.result !== "ok") throw new Error(j.message);
    ROWS = j.rows;
    renderAll();
  } catch (e) {
    document.getElementById("tbody").innerHTML = `<tr><td colspan="12" class="empty">불러오기 실패: ${e.message}<br>토큰이 만료되었으면 로그아웃 후 다시 접속해주세요.</td></tr>`;
  }
}

// 적립금 지급 여부 토글 (시트에 저장)
async function togglePaid(phone, checked, el) {
  el.disabled = true;
  try {
    const res = await fetch(window.EE_CONFIG.API_URL, {
      method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "mark_paid", token: TOKEN, phone, paid: checked }),
    });
    const j = await res.json();
    if (j.result !== "ok") throw new Error(j.message);
    const row = ROWS.find(r => r.phone === phone);
    if (row) row.paid = j.paid;
    renderStats();
    const tr = el.closest("tr");
    if (tr) tr.classList.toggle("is-paid", !!j.paid);
    // 미지급 필터 상태에서 지급 처리하면 목록에서 빠지도록 재렌더
    if (document.getElementById("fPaid").value) renderTable();
  } catch (e) {
    el.checked = !checked;
    alert("저장 실패: " + e.message + "\n다시 시도해주세요.");
  } finally { el.disabled = false; }
}

function renderAll() { renderStats(); renderTable(); }

function ymd(d) { return d ? String(d).slice(0, 10) : ""; }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function renderStats() {
  const today = todayStr();
  const week = new Date(Date.now() - 6*86400000);
  document.getElementById("stTotal").textContent = ROWS.length.toLocaleString();
  document.getElementById("stToday").textContent = ROWS.filter(r => ymd(r.joinedAt) === today).length.toLocaleString();
  document.getElementById("stWeek").textContent = ROWS.filter(r => new Date(ymd(r.joinedAt)) >= week).length.toLocaleString();
  const paid = ROWS.filter(r => r.paid === "V").length;
  document.getElementById("stPaid").innerHTML = paid.toLocaleString() +
    ` <small>/ 미지급 ${(ROWS.length - paid).toLocaleString()}</small>`;
  const berr = ROWS.filter(r => !isBirthValid(r.birth)).length;
  document.getElementById("stBirthErr").textContent = berr.toLocaleString();
}

function esc(v) { return String(v == null ? "" : v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderTable() {
  const b = document.getElementById("fBrand").value;
  const s = document.getElementById("fStore").value;
  const m = document.getElementById("fMkt").value;
  const pd = document.getElementById("fPaid").value;
  const bd = document.getElementById("fBirth").value;
  const q = document.getElementById("fSearch").value.trim();
  const list = ROWS.filter(r =>
    (!b || r.brand === b) && (!s || r.storeName === s) &&
    (!m || r.consentMarketing === m) &&
    (!pd || (pd === "paid" ? r.paid === "V" : r.paid !== "V")) &&
    (!bd || (bd === "err" ? !isBirthValid(r.birth) : isBirthValid(r.birth))) &&
    (!q || (r.name||"").includes(q) || (r.phone||"").includes(q))
  ).sort((a,b2) => String(b2.joinedAt).localeCompare(String(a.joinedAt)));

  document.getElementById("countNote").textContent = `${list.length.toLocaleString()}명 표시 중 (전체 ${ROWS.length.toLocaleString()}명)`;
  const tb = document.getElementById("tbody");
  if (!list.length) { tb.innerHTML = '<tr><td colspan="12" class="empty">조건에 맞는 회원이 없습니다.</td></tr>'; return; }
  tb.innerHTML = list.map(r => {
    const paid = r.paid === "V";
    const pj = esc(r.phone);
    return `<tr class="${paid?"is-paid":""}">
    <td class="paid-cell">
      <input type="checkbox" class="paid-chk" ${paid?"checked":""} onchange="togglePaid('${pj}', this.checked, this)">
      ${paid ? '<span class="paid-v">V</span>' : ''}
    </td>
    <td>${String(r.joinedAt).slice(0,16).replace("T"," ")}</td>
    <td><span class="pill ${r.brand==="아티드"?"artid":"city"}">${esc(r.brand)}</span></td>
    <td>${esc(r.storeName)}</td>
    <td>${esc(r.name)}</td>
    <td>${esc(r.phone)}</td>
    <td class="${isBirthValid(r.birth)?"":"birth-err"}">${esc(normBirth(r.birth) || r.birth)}</td>
    <td>${esc(r.gender)}</td>
    <td><span class="pill ${r.consentMarketing==="Y"?"y":"n"}">${r.consentMarketing==="Y"?"동의":"미동의"}</span></td>
    <td><span class="pill ${r.consentNight==="Y"?"y":"n"}">${r.consentNight==="Y"?"동의":"미동의"}</span></td>
    <td>${String(r.lastVisit||"").slice(0,10)}</td>
    <td>${r.visitCount||1}</td>
  </tr>`;
  }).join("");
}

// ── 회원등록용 CSV (DD고객엑셀파일양식) ─────────────────────
// 필수(파란색): 성명·성별·이동전화번호·생년월일·가입매장·가입일자
const REG_HEADER = ["성명","성별","이동전화번호","생일구분","생년월일","고객등급","고객상태","가입매장","가입일자",
  "SMS수신","이메일수신","이메일","카드번호","발급일자","DM발송지","배우자성명","배우자생일구분","배우자생년월일",
  "결혼일자","자택전화","자택우편번호","자택주소1","자택주소2","직업","직장명","직장전화번호","직장우편번호",
  "직장주소1","직장주소2","비고"];

// YYMMDD(6자리) → YYYYMMDD(8자리). 두 자리 연도가 올해보다 크면 19xx, 아니면 20xx
function toBirth8(v) {
  const s = normBirth(v);
  if (s.length === 8) return s;
  if (s.length !== 6) return "";
  const yy = Number(s.slice(0, 2));
  const nowYY = new Date().getFullYear() % 100;
  return (yy > nowYY ? "19" : "20") + s;
}

// 성별: 여성 0 / 남성 1 / 미선택 0
function toGenderCode(g) {
  return String(g || "").trim() === "남성" ? "1" : "0";
}

// 매장코드(재무) → ERP 매장코드(M0001 형식)
function toErpStore(storeId, storeName) {
  const s = window.EE_STORE_BY_ID[storeId];
  if (s && s.erp) return s.erp;
  const byName = window.EE_STORES.find(x => x.name === storeName);
  return (byName && byName.erp) || "";
}

// 회원등록용 데이터 행 생성 (필수 누락자는 skipped로 분리)
function buildRegRows() {
  const skipped = [];   // 필수(성명·전화·매장·가입일자) 누락 → 제외
  const birthWarn = []; // 생년월일 형식 오류 → 원본 그대로 포함(다운은 됨)
  const rows = [];
  ROWS.forEach(r => {
    const store = toErpStore(r.storeId, r.storeName);
    const joined = String(r.joinedAt || "").slice(0, 10).replace(/-/g, ""); // 20260722
    const miss = [];
    if (!r.name) miss.push("성명");
    if (!r.phone) miss.push("전화번호");
    if (!store) miss.push("가입매장코드");
    if (!joined) miss.push("가입일자");
    if (miss.length) { skipped.push(`${r.name || "(이름없음)"} / ${r.phone || "-"} — ${miss.join("·")} 없음`); return; }

    // 생년월일: 정상이면 8자리 변환, 오류여도 원본 숫자 그대로 넣고 경고만
    let birth;
    if (isBirthValid(r.birth)) {
      birth = toBirth8(r.birth);
    } else {
      birth = normBirth(r.birth);
      birthWarn.push(`${r.name} / ${r.phone} — 생년월일 "${r.birth || "(없음)"}"`);
    }

    const row = new Array(REG_HEADER.length).fill("");
    row[0] = r.name;                                 // 성명 (필수)
    row[1] = toGenderCode(r.gender);                 // 성별 (필수) 여0/남1/미선택0
    row[2] = r.phone;                                // 이동전화번호 (필수)
    row[4] = birth;                                  // 생년월일 YYYYMMDD (오류는 원본)
    row[7] = store;                                  // 가입매장 (필수) ERP코드
    row[8] = joined;                                 // 가입일자 (필수) YYYYMMDD
    row[9] = r.consentMarketing === "Y" ? "Y" : "N"; // SMS수신 ← 마케팅 수신 동의
    row[29] = `${r.brand || ""} QR가입${r.consentNight === "Y" ? " / 야간수신동의" : ""}`; // 비고
    rows.push(row);
  });
  return { rows, skipped, birthWarn };
}

function afterRegDownload(count, skipped, birthWarn, kind) {
  let msg = `회원등록용 ${kind} ${count}명 다운로드 완료`;
  if (birthWarn.length) {
    msg += `\n\n⚠ 생년월일 형식 확인 필요 ${birthWarn.length}명 (그대로 포함됨):\n` + birthWarn.join("\n")
        + `\n\n→ ‘생년월일 확인필요(오류)’ 필터로 찾아 수정할 수 있습니다.`;
  }
  if (skipped.length) {
    msg += `\n\n❌ 필수항목 누락으로 제외된 ${skipped.length}명:\n` + skipped.join("\n")
        + `\n\n→ 시트에서 해당 정보를 채운 뒤 다시 받아주세요.`;
  }
  alert(msg);
}

// 엑셀(.xlsx) 다운로드 — 모든 칸을 텍스트로(선행0·전화번호·YYYYMMDD 보존)
function downloadRegXlsx() {
  const { rows, skipped, birthWarn } = buildRegRows();
  if (!rows.length) { alert("등록 가능한 회원이 없습니다."); return; }

  const aoa = [REG_HEADER, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // 전 셀 텍스트 서식(숫자 자동변환 방지)
  const range = XLSX.utils.decode_range(ws["!ref"]);
  for (let R = 0; R <= range.e.r; R++) {
    for (let C = 0; C <= range.e.c; C++) {
      const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
      if (cell && cell.v !== "") { cell.t = "s"; cell.v = String(cell.v); cell.z = "@"; }
    }
  }
  ws["!cols"] = [{wch:10},{wch:6},{wch:15},{wch:8},{wch:10},{wch:8},{wch:8},{wch:9},{wch:11},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "회원등록");
  XLSX.writeFile(wb, `DD회원등록_${todayStr().replace(/-/g, "")}.xlsx`);
  afterRegDownload(rows.length, skipped, birthWarn, "엑셀");
}

function downloadCsv() {
  const header = ["가입일시","브랜드","매장코드","매장","이름","휴대전화","생년월일","성별","개인정보동의","마케팅동의","야간광고동의","최근방문","방문횟수"];
  const lines = [header.join(",")].concat(ROWS.map(r => [
    String(r.joinedAt).slice(0,19).replace("T"," "), r.brand, r.storeId, r.storeName, r.name, r.phone,
    r.birth, r.gender, r.consentPrivacy, r.consentMarketing, r.consentNight||"N", String(r.lastVisit||"").slice(0,10), r.visitCount||1
  ].map(v => `"${String(v==null?"":v).replace(/"/g,'""')}"`).join(",")));
  const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `멤버십_회원목록_${todayStr()}.csv`;
  a.click();
}
